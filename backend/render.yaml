services:
  - type: web
    name: prospera-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SERPER_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: APPOLO_API_KEY
        sync: false
      - key: ABSTRACT_API_KEY
        sync: false